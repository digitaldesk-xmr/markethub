<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="exchange_title">Exchange Crypto - MarketHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .exchange-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .exchange-header { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 2rem; margin-bottom: 2rem; text-align: center; }
        .widget-container { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 1rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" data-key="site_name">🛒 MarketHub</div>
        <div class="nav-links">
            <a href="index.html" data-key="nav_home">Home</a>
            <a href="products.html" data-key="nav_products">Prodotti</a>
            <a href="dashboard.html" id="dashboardLink" style="display:none;" data-key="nav_dashboard">Dashboard</a>
            <a href="upload-product.html" id="uploadLink" style="display:none;" data-key="nav_upload">Carica</a>
            <a href="exchange.html" data-key="nav_exchange">Exchange</a>
            <a href="messages.html" id="messagesLink" style="display:none;" data-key="nav_messages">Messaggi</a>
            <div class="lang-switch"><button class="lang-btn" onclick="setLanguage('it')">🇮🇹</button><button class="lang-btn" onclick="setLanguage('en')">🇬🇧</button></div>
            <button class="btn-outline" onclick="showLogin()" id="loginBtn" data-key="btn_login">Accedi</button>
            <button class="btn-primary-small" onclick="showRegister()" id="registerBtn" data-key="btn_register">Registrati</button>
            <a href="#" onclick="logout()" id="logoutLink" style="display:none;" data-key="nav_logout">Esci</a>
        </div>
    </div>
</nav>
<div class="exchange-container">
    <div class="exchange-header">
        <h1 data-key="exchange_title">💰 Crypto Exchange</h1>
        <p data-key="exchange_sub">Scambia criptovalute in modo semplice, veloce e sicuro con Trocador</p>
    </div>
    <div class="widget-container">
        <h3 style="margin-bottom:1rem;" data-key="widget_title">📊 Widget Exchange</h3>
        <iframe src="https://trocador.app/widget/?ref=7r1gqp1T5p&lang=en" width="100%" height="600" scrolling="no" style="border:none; border-radius:16px;"></iframe>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
