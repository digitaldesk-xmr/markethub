<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="all_products_title">Prodotti - MarketHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" data-key="site_name">🛒 MarketHub</div>
        <div class="nav-links">
            <a href="index.html" data-key="nav_home">Home</a>
            <a href="products.html" data-key="nav_products">Prodotti</a>
            <a href="dashboard.html" id="dashboardLink" style="display:none;" data-key="nav_dashboard">Dashboard</a>
            <a href="upload-product.html" id="uploadLink" style="display:none;" data-key="nav_upload">Carica</a>
            <a href="exchange.html" data-key="nav_exchange">Exchange</a>
            <a href="messages.html" id="messagesLink" style="display:none;" data-key="nav_messages">Messaggi</a>
            <div class="lang-switch"><button class="lang-btn" onclick="setLanguage('it')">🇮🇹</button><button class="lang-btn" onclick="setLanguage('en')">🇬🇧</button></div>
            <button class="btn-outline" onclick="showLogin()" id="loginBtn" data-key="btn_login">Accedi</button>
            <button class="btn-primary-small" onclick="showRegister()" id="registerBtn" data-key="btn_register">Registrati</button>
            <a href="#" onclick="logout()" id="logoutLink" style="display:none;" data-key="nav_logout">Esci</a>
        </div>
    </div>
</nav>
<div class="products-container">
    <div class="products-header">
        <h1 data-key="all_products_title">Tutti i prodotti</h1>
        <div class="filters">
            <input type="text" id="searchInput" data-key="search_placeholder" placeholder="🔍 Cerca prodotti..." onkeyup="filterProducts()">
            <select id="categoryFilter" onchange="filterProducts()">
                <option value="all" data-key="all_categories">Tutte le categorie</option>
                <option value="Elettronica" data-key="cat_electronics">Elettronica</option>
                <option value="Abbigliamento" data-key="cat_clothing">Abbigliamento</option>
                <option value="Casa" data-key="cat_home">Casa e Arredamento</option>
                <option value="Sport" data-key="cat_sport">Sport</option>
                <option value="Collezionismo" data-key="cat_collectibles">Collezionismo</option>
                <option value="Altro" data-key="cat_other">Altro</option>
            </select>
        </div>
    </div>
    <div id="productsList" class="products-grid"></div>
</div>
<div id="productModal" class="modal"><div class="modal-content modal-large"><span class="close" onclick="closeProductModal()">&times;</span><div id="productDetail"></div><div id="paymentButtons" class="payment-buttons"></div></div></div>
<script src="script.js"></script>
</body>
</html>
