<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carica prodotto - MarketHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">🛒 MarketHub</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Prodotti</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="exchange.html">Exchange</a>
            <a href="messages.html">Messaggi</a>
            <a href="upload-product.html">Carica</a>
            <div class="lang-switch"><button class="lang-btn" onclick="setLanguage('it')">🇮🇹</button><button class="lang-btn" onclick="setLanguage('en')">🇬🇧</button></div>
            <a href="#" onclick="logout()">Esci</a>
        </div>
    </div>
</nav>
<div class="upload-container">
    <h1>Carica un nuovo prodotto</h1>
    <p>Inserisci i dettagli del prodotto per venderlo in tutto il mondo</p>
    <form id="uploadProductForm" class="upload-form" enctype="multipart/form-data">
        <div class="form-group"><label>Foto prodotto *</label><input type="file" id="productImageFile" accept="image/*" required><div id="imagePreview" class="image-preview"></div></div>
        <div class="form-group"><label>Nome prodotto *</label><input type="text" id="productName" required placeholder="Es. iPhone 14 Pro"></div>
        <div class="form-group"><label>Descrizione *</label><textarea id="productDescription" rows="4" required placeholder="Descrivi il prodotto in dettaglio..."></textarea></div>
        <div class="form-row"><div class="form-group"><label>Prezzo (€) *</label><input type="number" id="productPrice" step="0.01" required></div><div class="form-group"><label>Categoria *</label><select id="productCategory" required><option>Elettronica</option><option>Abbigliamento</option><option>Casa</option><option>Sport</option><option>Collezionismo</option><option>Altro</option></select></div><div class="form-group"><label>Quantità</label><input type="number" id="productQuantity" value="1" min="1"></div></div>
        <div class="form-group"><label>Condizione</label><select id="productCondition"><option>Nuovo</option><option>Come nuovo</option><option>Ottimo</option><option>Buono</option></select></div>
        <div class="form-row"><div class="form-group"><label>Paese di spedizione</label><select id="productShippingFrom"><option value="IT">Italia</option><option value="EU">Europa</option><option value="Worldwide">Mondo</option></select></div><div class="form-group"><label>Costo spedizione (€)</label><input type="number" id="productShippingCost" value="0" step="0.01"></div></div>
        <button type="submit" class="btn btn-primary btn-large">📤 Pubblica prodotto</button>
    </form>
    <div id="uploadMessage" class="alert"></div>
</div>
<script src="script.js"></script>
</body>
</html>
